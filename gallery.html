    <span class="toggle-icon moon-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        <div class="container-fluid too-wide">
            <div id="carouselExampleDark" class="carousel slide" data-bs-ride="carousel">
              <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="1" aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="2" aria-label="Slide 3"></button>
                <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="3" aria-label="Slide 4"></button>
                <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="4" aria-label="Slide 5"></button>
                <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="5" aria-label="Slide 6"></button>
                <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="6" aria-label="Slide 7"></button>

                <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="10" aria-label="Slide 11"></button>
              </div>
              <div class="carousel-inner">
                <div class="carousel-item active" data-bs-interval="10000">
                  <img src="images/gallery/2021-22 Team.jpg" class="d-block w-100 carou-top" alt="..." title="2021-22 Team">
                </div>
                <div class="carousel-item" data-bs-interval="2000">
                  <img src="images/gallery/2022-23 Team.jpg" class="d-block w-100 carou-top" alt="..." title="2022-23 Team">
                </div>
                <div class="carousel-item">
                  <img src="images/gallery/2023-24 Team 2.jpg" class="d-block w-100 carou-top" alt="..." title="2023-24 Team">
                </div>
                <div class="carousel-item">
                  <img src="images/gallery/2023-24 Team.jpg" class="d-block w-100 carou-top" alt="..." title="2023-24 Team">
                </div>
                <div class="carousel-item">
                  <img src="images/gallery/GD.jpg" class="d-block w-100 carou-top" alt="..." title="Group Discussion">
                </div>
                <div class="carousel-item">
                  <img src="images/gallery/Integrationn Bee.png" class="d-block w-100 carou-top" alt="..." title="Integration Bee">
                </div>
                <div class="carousel-item">
                  <img src="images/gallery/LogicGC 23.jpg" class="d-block w-100 carou-top" alt="..." title="Logic GC">
                </div>
                <div class="carousel-item">
                  <img src="images/gallery/Physics Bazinga 23.jpg" class="d-block w-100 carou-top" alt="..." title="Physics Bazinga">
                </div>
                <div class="carousel-item">
                  <img src="images/gallery/Rukhsat 24.jpg" class="d-block w-100 carou-top" alt="..." title="Rukhsat">
                </div>
                <div class="carousel-item">
                  <img src="images/gallery/STR GD 1.jpg" class="d-block w-100 carou-top" alt="..." title="Group Discussion on Special Theory of Relativity">
                </div>
                <div class="carousel-item">
                  <img src="images/gallery/STR GD 2.jpg" class="d-block w-100 carou-top" alt="..." title="Group Discussion on Special Theory of Relativity">
                </div>
              </div>
              <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
              </button>
