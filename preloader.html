<div id="preloader">
  <div class="box-wrapper">
    <div class="flap"></div>
    <svg class="cat-svg" id="cat" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="white">
      <path id="alive-cat" d="M32 2c3 0 5 2 5 5s-2 5-5 5-5-2-5-5 2-5 5-5zm0 15c9 0 16 7 16 16s-7 16-16 16-16-7-16-16 7-16 16-16zm-6 24c2 3 5 5 6 5s4-2 6-5l6 3c-3 6-9 10-12 10s-9-4-12-10l6-3z"/>
    </svg>
  </div>

  <div class="quantum-bar">
    <div class="bar-inner"></div>
  </div>

  <div class="infinity-loader">
    <svg viewBox="0 0 200 100" width="200" height="100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ff3366"/>
        </filter>
        <filter id="pathGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="white"/>
        </filter>
      </defs>

      <path id="infinity-path"
        d="M30,50 
           C30,20 70,20 100,50 
           C130,80 170,80 170,50 
           C170,20 130,20 100,50 
           C70,80 30,80 30,50 Z"
        fill="none"
        stroke="white"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#pathGlow)"/>

      <circle r="3" fill="#ff3366" filter="url(#glow)">
        <animateMotion dur="1.5s" repeatCount="indefinite">
          <mpath href="#infinity-path"/>
        </animateMotion>
      </circle>
    </svg>
  </div>

  <div class="loading-text">Loading Schrödinger's cat...</div>
</div>

<link rel="stylesheet" href="preloader.css">
<script src="preloader.js" defer></script>
